# ts-docs/SmartQuotes.yml
# Flags curly/smart quotation marks in raw AsciiDoc source.
# AsciiDoc source should use straight ASCII quotes; the renderer
# applies typographic quotes as needed. Curly quotes in source
# can cause rendering issues and encoding problems.
# Ported from RedHat.SmartQuotes.
extends: substitution
message: "Do not use curly/smart quotation marks. Use straight ASCII quotes instead of '%s'."
level: warning
nonword: true
scope: raw
action:
  name: replace
swap:
  '\u2018|\u2019': "'"
  '\u201C|\u201D|\u201F|\u2033|\u2036': '"'
