# ts-docs/DoNotUseTerms.yml
# Flags phrases and words that add no meaning, violate the ThoughtSpot
# developer docs style guide, or are inappropriate in technical writing.
# Renamed from BannedPhrases.yml; expanded with IBM/RedHat-sourced additions.
extends: existence
message: "Avoid '%s' in technical documentation. Rewrite the sentence."
link: ''
level: warning
ignorecase: true
tokens:
  # ---- Filler / hedge words --------------------------------
  - 'simply'
  # Excludes "just-in-time" and "just in time" (legitimate technical phrases).
  - 'just(?![ -]in[ -]time)'
  - '\beasy\b'
  - '\beast\b'
  - 'easily'
  - 'trivial'
  - 'obviously'
  - 'of course'
  - 'clearly'
  - 'basically'
  - 'essentially'
  - 'actually'
  - '\bvery\b'
  - '\bquite\b'
  - '\breally\b'

  # ---- Vague time / marketing language --------------------
  - '\bsoon\b'
  - 'new and improved'
  - 'state of the art'
  - 'cutting[- ]edge'
  - 'best in class'
  - 'world[- ]class'
  - 'industry[- ]leading'
  - 'best of breed'

  # ---- Redundant meta-commentary --------------------------
  - 'as mentioned (above|previously|earlier)'
  - 'as stated (above|previously|earlier)'
  - 'needless to say'
  - 'it goes without saying'
  - 'it should be noted'
  - 'it is important to note'

  # ---- "Please" in technical writing ----------------------
  # Technical docs use imperative voice; "please" is informal.
  - '\bplease\b'

  # ---- Ambiguous constructions (IBM/RedHat) ---------------
  # and/or: rewrite as "a and b", "a or b", or "a, b, or both".
  - 'and/or'
  # "respectively" forces readers to mentally match items across lists;
  # rewrite as explicit pairings instead.
  - '\brespectively\b'

  # ---- Vague enumerations (Microsoft.Avoid) ---------------
  # "and so on" is vague — list all items explicitly or use "such as".
  - 'and so on'

  # ---- Placeholder jargon ---------------------------------
  # foo/fubar are developer in-jokes; use descriptive variable names.
  - '\bfoo\b'
  - '\bfubar\b'

  # ---- ThoughtSpot-specific banned phrases ----------------
  # Add deprecated product names, old slogans, or phrases
  # prohibited by legal or brand guidelines.
  # - 'OldBrandName'
  # - 'deprecated-feature'
