# ts-docs/WordList.yml
# Adapted from github.com/splunk/vale-splunk-style-guide
# Flags variant or deprecated terms and suggests the preferred form.
extends: substitution
message: "Use '%s' instead of '%s'."
level: warning
ignorecase: false
action:
  name: replace
swap:
  # -------------------------------------------------------
  # UI INTERACTION TERMS
  # -------------------------------------------------------
  'click on': click
  'hit': press
  'depress': press
  'check out': see

  # -------------------------------------------------------
  # DIRECTIONAL REFERENCES
  # Replace spatial directions with relative document refs
  # -------------------------------------------------------
  'above': the previous section
  'below': the following section

  # -------------------------------------------------------
  # WORDY PHRASES - replace with concise alternatives
  # -------------------------------------------------------
  'in order to': to
  'due to the fact that': because
  'at this point in time': now
  'at present': now
  'basic steps': steps
  'be sure to': make sure
  'in the event that': if
  'prior to': before
  'subsequent to': after
  'with regard to': about
  'with respect to': about
  'as per': per
  'a number of': several|many

  # -------------------------------------------------------
  # TECHNICAL TERM CONSISTENCY
  # -------------------------------------------------------
  'boolean': Boolean
  'can not': cannot
  'checkbox': check box
  'carriage return': line break
  'utilize': use
  'utilization': usage
  'leverage': use
  'functionality': features
  'performant': high-performance

  # -------------------------------------------------------
  # INCLUSIVE LANGUAGE
  # -------------------------------------------------------
  'whitelist': allowlist
  'blacklist': blocklist
  'master branch': main branch
  'dummy': placeholder|stub
  'sanity check': confidence check|smoke test

  # -------------------------------------------------------
  # THOUGHTSPOT PRODUCT-SPECIFIC TERMS
  # Applies to prose text only - code blocks, URLs, and
  # parameter/variable names are excluded by Vale's
  # AsciiDoc parser before these rules run.
  # -------------------------------------------------------

  # Deprecated plain-English feature names (prose only)
  'pinboard': Liveboard
  'Pinboard': Liveboard
  'sage embed': Spotter embed
  'sage search': natural language search
  'Ask sage': Ask AI

  # Worksheet deprecated - replaced by Model.
  # Word boundaries ensure worksheetId and other SDK parameter
  # names in code are never matched - only bare prose words fire.
  # Context guide:
  #   UI element reference  -> Model (capitalized)
  #   Descriptive prose     -> model or data model (lowercase)
  '\bworksheet\b': model
  '\bWorksheet\b': Model
  '\bworksheets\b': models
  '\bWorksheets\b': Models


  # Deprecated SDK class names referenced in prose
  # (e.g. "Use SageEmbed to..." in a migration guide)
  'SageEmbed': SpotterEmbed
  'SageEmbedQuery': SpotterEmbed
  'PinboardEmbed': LiveboardEmbed
  'PinboardEmbedViewConfig': LiveboardViewConfig

  # -------------------------------------------------------
  # THOUGHTSPOT WRITING CONVENTIONS
  # Source: ThoughtSpot style guide
  # -------------------------------------------------------

  # Brand abbreviations - always write the full name in external content
  '\bTS\b': ThoughtSpot
  '\bTSE\b': ThoughtSpot Embedded

  # All-caps variant — incorrect casing, suggest correct brand name
  '\bTHOUGHTSPOT\b': ThoughtSpot

  # Deprecated product name - replaced by ThoughtSpot Embedded
  '\bThoughtSpot Everywhere\b': ThoughtSpot Embedded

  # Acronym style - no periods (use AI not A.I.)
  'A\.I\.': AI
  'B\.I\.': BI

  # Compound word and hyphenation conventions
  'dropdown': drop-down
  'drop down': drop-down
  '[Ee]-mail': email
  '[Ee]-book': ebook
  'front line': frontline
  'front-line': frontline
  'white paper': whitepaper

  # ThoughtSpot product and feature naming
  'liveboards': Liveboards
  'live analytics': Live Analytics
  'data lakehouse': lakehouse
  '[Rr]eal-time insights': Instant insights
  'zero to search': zero-to-search

  # Use low-code, not no-code
  'no-code': low-code

  # -------------------------------------------------------
  # PLAIN ALTERNATIVES (from IBM/RedHat SimpleWords)
  # Prefer plain alternatives in technical writing.
  # -------------------------------------------------------
  'commence': begin
  'initiate': start|begin
  'numerous': many
  'a lot of': many|much

  # -------------------------------------------------------
  # WORDY PHRASES (from Microsoft.Wordiness)
  # -------------------------------------------------------
  'has the ability to': can
  'has the capacity to': can
  'whether or not': whether
  'despite the fact that': although
  'because of the fact that': because
  'successfully complete': complete
  'take into account': consider
  'in lieu of': instead of
  'make reference to': refer to
  'made reference to': referred to
  'with the exception of': except for
  'except when': unless
  'not in a position to': unable
  'in many cases': often
  'in most cases': usually
  'a (?:large)? majority of': most
  'a myriad of': myriad
  'any and all': all
  'at all times': always
  'at a later date': later
  'continue on': continue
  'during the period of': during
  'during the time that': while
  'establish connectivity': connect
  'for the duration of': during
  'in an effort to': to
  'in between': between
  'in spite of the fact that': although
  'pertaining to': about
  'until such time as': until

  # -------------------------------------------------------
  # TERMS ADOPTED FROM GOOGLE DEVELOPER STYLE GUIDE
  # Google.WordList is suppressed in .vale.ini; applicable
  # entries are maintained here instead.
  # Excluded: Google-specific product names (Cloud, Container
  # Engine, Developers Console), Android/mobile-only terms,
  # and entries already covered above.
  # -------------------------------------------------------

  # Auth and security
  '(?:OAuth ?2|Oauth)': OAuth 2.0
  'authN': authentication
  'authZ': authorization
  'SHA1': SHA-1
  'sign into': sign in to

  # Capitalization and spelling
  '(?:WiFi|wifi)': Wi-Fi
  'HTTPs': HTTPS
  '\burl\b': URL
  'synch': sync
  'k8s': Kubernetes

  # Technical writing conventions
  'data are': data is
  'file name': filename
  'a\.k\.a|aka': or|also known as
  'vs\.': versus
  'approx\.': approximately
  'autoupdate': automatically update

  # UI actions
  'un(?:check|select)': clear
  '(?:kill|terminate|abort)': stop|exit|cancel|end
