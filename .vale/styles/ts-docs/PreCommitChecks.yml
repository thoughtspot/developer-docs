# ts-docs/PreCommitChecks.yml
# Flags content that must be removed or replaced before committing.
# Covers unfilled template tokens and Git merge conflict markers.
# Applied to raw source (raw:) so tokens in AsciiDoc attributes
# and headers are also caught.
extends: existence
message: "Pre-commit issue: '%s' — remove or replace before committing."
level: error
nonword: true
raw:
  # ---- Standard template tokens ---------------------------
  - '<version>'
  - '<Title'
  - '<slug>'
  - 'DOC-XXXX'
  - 'JIRA-REF'
  - 'ENG-XXXX'
  - 'your-style-guide-url'

  # ---- In-template TODO comments --------------------------
  - 'TODO: verify with engineering'
  - 'TODO: verify scope with engineering'
  - 'TODO: add screenshot'
  - 'TODO: confirm with'

  # ---- ThoughtSpot template tokens ------------------------
  # Tokens used in modules/_templates/*.adoc that must be
  # replaced before a page is published.
  - '<Title: '
  - '<Title —'
  - '<One sentence:'
  - '<Add a unique ID'
  - '<comma-separated terms'
  - '<version>'
  - '<DOC-XXXX>'
  - '<role or permission'
  - '<system or resource'
  - '<file-name>'
  - 'your-instance'
  - 'liveboard-GUID'
  - '<your-instance>'
  - '<liveboard-GUID>'
  - '<username>'
  - '<token>'
  - '<endpoint>'

  # ---- Add your own template placeholder patterns ---------
  # - '<YOUR-TOKEN>'

  # ---- Git merge conflict markers -------------------------
  # These must never appear in committed or published content.
  - '^<{7}\s.*$'
  - '^={7}$'
  - '^>{7}\s.*$'
