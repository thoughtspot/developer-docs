# ts-docs/SentenceLength.yml
# Flags sentences in paragraph prose that exceed 30 words.
# Code blocks, headings, lists, and other non-prose content
# are ignored automatically by Vale's AsciiDoc parser.
# Raise max if the rule is too noisy for your content.
extends: occurrence
message: "Long sentence (%d words). Aim for 30 or fewer."
level: suggestion
scope: sentence
max: 30
token: '\b\w+'
