# ts-docs/RepeatedWords.yml
# Flags consecutive repeated words, e.g. "the the" or "and and".
# Ported from RedHat.RepeatedWords.
extends: repetition
message: "'%s' is repeated. Remove the duplicate."
level: warning
ignorecase: false
alpha: true
action:
  name: edit
  params:
    - regex
    - '(\w+)(\s\w+)'
    - "$1"
tokens:
  - '[^\s\.]+'
  - '[^\s]+'
