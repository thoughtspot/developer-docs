# ts-docs/LinkText.yml
# Flags non-descriptive link text that violates accessibility
# and ThoughtSpot style guidelines.
# Rule: linked text must tell the reader what they are clicking on.
# Do not link more than three to four words.
extends: existence
message: "Avoid '%s' as link text. Use words that tell the reader what they are clicking on."
level: warning
ignorecase: true
tokens:
  - 'click here'
  - 'click this link'
  - 'click here to'
  - 'read more'
  - 'learn more'
  - 'here\.'
  - 'this link'
