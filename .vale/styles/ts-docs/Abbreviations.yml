# ts-docs/Abbreviations.yml
# Flags acronyms used without a definition earlier on the same page.
# Expected format on first use: Full Name (ACRONYM)
# Example: "Representational State Transfer (REST)"
#
# How it works:
#   For each bare acronym (first pattern), Vale checks whether the
#   spelled-out form with the acronym in parentheses (second pattern)
#   has appeared before it in the document. If not, it flags that use.
#   Once a definition is added, all subsequent bare uses are cleared.
#   scope: text means the entire file is the unit of comparison.
extends: conditional
message: "Define '%s' on first use: spell it out as 'Full Name (ABBR)'."
level: warning
ignorecase: false
# Bare acronym - three or more consecutive uppercase letters, optional plural s
first: '\b([A-Z]{3,}s?)\b'
# Spelled-out form followed by the acronym in parentheses
# e.g. "Representational State Transfer (REST)"
second: '(?:[A-Za-z][A-Za-z]* ){1,}\(([A-Z]{3,})\)'
scope: text

exceptions:
  # Include well-known acronyms and abbreviations that need not be defined in technical documentation
  # If the documentation is intended for non-technical audience, define these on first use
  # Add THOUGHTSPOT and product-specific acronyms/abbreviations that need not be expanded/defined.
