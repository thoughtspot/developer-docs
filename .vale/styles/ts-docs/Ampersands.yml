# ts-docs/Ampersands.yml
# Flags ampersands used in place of "and" in prose.
# ThoughtSpot style: spell out "and" in full.
# Exception: ampersands are allowed in formal names and
# common abbreviations (Q&A, R&D, P&L) where no spaces
# surround the symbol - those forms are not matched here.
extends: existence
message: "Spell out 'and' in full. Use '&' only in formal names (e.g. Q&A, R&D)."
level: warning
tokens:
  # Matches & surrounded by spaces - the prose "and" usage.
  # Does NOT match Q&A, R&D, or other no-space abbreviations.
  - '\s&\s'
