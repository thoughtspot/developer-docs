# ts-docs/Headings.yml
# Enforces sentence-case headings (capitalise only the first word
# and proper nouns). Follows Google and Red Hat conventions.
extends: capitalization
message: "'%s' should use sentence case — capitalise only the first word and noun phrases."
level: warning
scope: heading
match: $sentence
# Add every proper noun, product name, acronym, and brand term
# that should remain capitalised mid-heading.
exceptions:
  # -------------------------------------------------------
  # STANDARD TECHNICAL ACRONYMS
  # -------------------------------------------------------
  - API
  - APIs
  - CLI
  - UI
  - UX
  - URL
  - URLs
  - URI
  - HTTP
  - HTTPS
  - REST
  - YAML
  - JSON
  - XML
  - HTML
  - CSS
  - SQL
  - SSH
  - TLS
  - SSL
  - OAuth
  - JWT
  - SDK
  - IDE
  - CI
  - CD
  - AWS
  - GCP
  - Azure
  - Linux
  - macOS
  - Windows
  - GitHub
  - GitLab
  - Docker
  - Kubernetes

  # -------------------------------------------------------
  # THOUGHTSPOT PRODUCT AND BRAND NAMES
  # -------------------------------------------------------
  - ThoughtSpot
  - Spotter
  - SpotterAgent
  - SpotterCode
  - SpotterDocs
  - SpotApps
  - SpotDev

  # Embed SDK component names
  - AppEmbed
  - LiveboardEmbed
  - SearchEmbed
  - SearchBarEmbed
  - SpotterEmbed
  - SpotterAgentEmbed
  - ConversationEmbed
  - PreRenderedLiveboardEmbed

  # Product feature nouns
  - Liveboard
  - Liveboards
  - Worksheet
  - Worksheets
  - TML
  - GUID

  # SDK event types (appear in headings as EmbedEvent.Load, HostEvent.Pin, etc.)
  - EmbedEvent
  - HostEvent

  # Auth and security terms
  - TrustedAuthToken
  - TrustedAuthTokenCookieless
  - AuthType
  - SAML
  - SSO
  - CORS
  - RBAC
  - ABAC
  - RLS
  - CRUD

  # Multi-tenancy
  - Org
  - Orgs

  # Languages and frameworks
  - JavaScript
  - TypeScript
  - React
  - Antora

  # Additional acronyms
  - CSV
  - PDF
  - JWT

  # Cloud and integration partners
  - Salesforce
  - Snowflake
  - Databricks
  - Google
  - Microsoft
  - Slack
  - Vercel
  - Pendo

